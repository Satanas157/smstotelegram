name: Build Pericial Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Essential Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev zip unzip openjdk-17-jdk libncurses5 libstdc++6 zlib1g-dev libssl-dev libffi-dev libsqlite3-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # Aceita licenças e inicia o build
          yes | buildozer android debug
        env:
          PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: 0
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: materialidade-forense
          path: bin/*.apk
