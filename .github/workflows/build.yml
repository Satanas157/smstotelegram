name: Build Pericial Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev zip unzip libncurses5 libstdc++6 zlib1g-dev libssl-dev libffi-dev libsqlite3-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer

      - name: Build with Buildozer
        run: |
          # Rodando sem o 'yes |' para evitar o Broken Pipe, usando a flag interna do buildozer
          buildozer android debug
        env:
          # Força o aceite de licenças via variável de ambiente
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: 0

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: materialidade-forense
          path: bin/*.apk
